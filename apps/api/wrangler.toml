name = "boss-platform-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"

[observability.logs]
enabled = true

# ─── Cron Triggers ────────────────────────────────────────────────────────────
[triggers]
crons = [
  "0 9 * * *",    # AR chase — daily at 09:00 UTC
  "0 8 * * *",    # Renewal alerts — daily at 08:00 UTC
  "0 */6 * * *",  # Deliverability monitor — every 6 hours
]

# ─── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "boss-platform"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# ─── KV Namespace ─────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# ─── R2 Bucket ────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "R2"
bucket_name = "boss-platform-deliveries"

# ─── Queues ───────────────────────────────────────────────────────────────────
[[queues.producers]]
binding = "QUEUE"
queue = "boss-lead-queue"

[[queues.producers]]
binding = "LEAD_QUEUE"
queue = "boss-lead-queue"

[[queues.consumers]]
queue = "boss-lead-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "boss-lead-dlq"
